name: cv_builder
description: "CV Studio Pro — Premium AI-powered CV builder"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # PDF Generation & Export
  pdf: ^3.12.0
  printing: ^5.14.3

  # Supabase (Auth + Database)
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP & APIs
  http: ^1.2.1

  # Location (for weather)
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # Caching & Local Storage
  shared_preferences: ^2.3.2

  # Date/Time formatting
  intl: ^0.19.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
